<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Ménage</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        #app {
            max-width: 500px;
            margin: 0 auto;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        li.purchased {
            text-decoration: line-through;
            color: #888;
        }

        button {
            cursor: pointer;
        }

        div > div {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>Gestion de Ménage</h1>

    <div id="app">
        <h2>Membres du Ménage</h2>
        <ul id="member-list"></ul>
        <form id="add-member-form">
            <input type="text" id="member-name" placeholder="Nom du membre" required>
            <button type="submit">Ajouter un membre</button>
        </form>
        <hr>

        <h2>Tâches Ménagères</h2>
        <ul id="chore-list"></ul>
        <form id="add-chore-form">
            <input type="text" id="chore-description" placeholder="Description de la tâche" required>
            <button type="submit">Ajouter une tâche</button>
        </form>
        <hr>

        <h2>Liste de Courses</h2>
        <ul id="shopping-list"></ul>
        <form id="add-item-form">
            <input type="text" id="item-name" placeholder="Nom de l'article" required>
            <button type="submit">Ajouter un article</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const memberList = document.getElementById('member-list');
            const addMemberForm = document.getElementById('add-member-form');
            const memberNameInput = document.getElementById('member-name');
            const choreList = document.getElementById('chore-list');
            const addChoreForm = document.getElementById('add-chore-form');
            const choreDescriptionInput = document.getElementById('chore-description');
            const shoppingList = document.getElementById('shopping-list');
            const addItemForm = document.getElementById('add-item-form');
            const itemNameInput = document.getElementById('item-name');

            // Local Storage Helpers
            const getFromStorage = (key) => JSON.parse(localStorage.getItem(key)) || [];
            const saveToStorage = (key, data) => localStorage.setItem(key, JSON.stringify(data));

            // Data
            let members = getFromStorage('members');
            let chores = getFromStorage('chores');
            let shoppingListItems = getFromStorage('shoppingListItems');

            // --- Members ---
            function renderMembers() {
                memberList.innerHTML = '';
                members.forEach(member => {
                    const li = document.createElement('li');
                    li.textContent = member.name;
                    const deleteButton = document.createElement('button');
                    deleteButton.textContent = 'Supprimer';
                    deleteButton.addEventListener('click', () => deleteMember(member.id));
                    li.appendChild(deleteButton);
                    memberList.appendChild(li);
                });
            }

            addMemberForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const memberName = memberNameInput.value.trim();
                if (memberName) {
                    members.push({ id: Date.now(), name: memberName });
                    saveToStorage('members', members);
                    memberNameInput.value = '';
                    renderMembers();
                    renderChores(); // Update assignee dropdowns
                }
            });

            function deleteMember(id) {
                members = members.filter(member => member.id !== id);
                // Unassign chores from the deleted member
                chores = chores.map(chore => {
                    if (chore.assignedTo === id) {
                        chore.assignedTo = null;
                    }
                    return chore;
                });
                saveToStorage('members', members);
                saveToStorage('chores', chores);
                renderMembers();
                renderChores();
            }

            // --- Chores ---
            function renderChores() {
                choreList.innerHTML = '';
                chores.forEach(chore => {
                    const li = document.createElement('li');
                    const description = document.createElement('span');
                    description.textContent = chore.description;
                    li.appendChild(description);

                    const controls = document.createElement('div');

                    const completedCheckbox = document.createElement('input');
                    completedCheckbox.type = 'checkbox';
                    completedCheckbox.checked = chore.completed;
                    completedCheckbox.addEventListener('change', () => {
                        updateChore(chore.id, { completed: completedCheckbox.checked });
                    });
                    controls.appendChild(completedCheckbox);

                    const assigneeSelect = document.createElement('select');
                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.textContent = 'Non assigné';
                    assigneeSelect.appendChild(defaultOption);
                    members.forEach(member => {
                        const option = document.createElement('option');
                        option.value = member.id;
                        option.textContent = member.name;
                        if (chore.assignedTo === member.id) {
                            option.selected = true;
                        }
                        assigneeSelect.appendChild(option);
                    });
                    assigneeSelect.addEventListener('change', () => {
                        updateChore(chore.id, { assignedTo: assigneeSelect.value ? parseInt(assigneeSelect.value) : null });
                    });
                    controls.appendChild(assigneeSelect);

                    const deleteButton = document.createElement('button');
                    deleteButton.textContent = 'Supprimer';
                    deleteButton.addEventListener('click', () => deleteChore(chore.id));
                    controls.appendChild(deleteButton);

                    li.appendChild(controls);
                    choreList.appendChild(li);
                });
            }

            addChoreForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const choreDescription = choreDescriptionInput.value.trim();
                if (choreDescription) {
                    chores.push({ id: Date.now(), description: choreDescription, completed: false, assignedTo: null });
                    saveToStorage('chores', chores);
                    choreDescriptionInput.value = '';
                    renderChores();
                }
            });

            function deleteChore(id) {
                chores = chores.filter(chore => chore.id !== id);
                saveToStorage('chores', chores);
                renderChores();
            }

            function updateChore(id, data) {
                chores = chores.map(chore => {
                    if (chore.id === id) {
                        return { ...chore, ...data };
                    }
                    return chore;
                });
                saveToStorage('chores', chores);
                renderChores();
            }

            // --- Shopping List ---
            function renderShoppingList() {
                shoppingList.innerHTML = '';
                shoppingListItems.forEach(item => {
                    const li = document.createElement('li');
                    const description = document.createElement('span');
                    description.textContent = item.item;
                    li.appendChild(description);

                    if (item.purchased) {
                        li.classList.add('purchased');
                    }

                    const controls = document.createElement('div');

                    const purchasedCheckbox = document.createElement('input');
                    purchasedCheckbox.type = 'checkbox';
                    purchasedCheckbox.checked = item.purchased;
                    purchasedCheckbox.addEventListener('change', () => {
                        updateShoppingListItem(item.id, { purchased: purchasedCheckbox.checked });
                    });
                    controls.appendChild(purchasedCheckbox);

                    const deleteButton = document.createElement('button');
                    deleteButton.textContent = 'Supprimer';
                    deleteButton.addEventListener('click', () => deleteShoppingListItem(item.id));
                    controls.appendChild(deleteButton);

                    li.appendChild(controls);
                    shoppingList.appendChild(li);
                });
            }

            addItemForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const itemName = itemNameInput.value.trim();
                if (itemName) {
                    shoppingListItems.push({ id: Date.now(), item: itemName, purchased: false });
                    saveToStorage('shoppingListItems', shoppingListItems);
                    itemNameInput.value = '';
                    renderShoppingList();
                }
            });

            function deleteShoppingListItem(id) {
                shoppingListItems = shoppingListItems.filter(item => item.id !== id);
                saveToStorage('shoppingListItems', shoppingListItems);
                renderShoppingList();
            }

            function updateShoppingListItem(id, data) {
                shoppingListItems = shoppingListItems.map(item => {
                    if (item.id === id) {
                        return { ...item, ...data };
                    }
                    return item;
                });
                saveToStorage('shoppingListItems', shoppingListItems);
                renderShoppingList();
            }

            // Initial Render
            renderMembers();
            renderChores();
            renderShoppingList();
        });
    </script>
</body>
</html>
